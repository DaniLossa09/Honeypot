<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HoneypotX — Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080c10;
            --surface: #0d1117;
            --border: #1a2332;
            --accent: #00ff88;
            --danger: #ff3355;
            --text: #c9d1d9;
            --muted: #4a5568;
            --font-head: 'Rajdhani', sans-serif;
            --font-body: 'Inter', sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-body);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-image: 
              linear-gradient(rgba(0,255,136,0.02) 1px, transparent 1px),
              linear-gradient(90deg, rgba(0,255,136,0.02) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .login-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 360px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
        }

        .logo {
            font-family: var(--font-head);
            font-size: 28px;
            color: #fff;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }
        .logo span { color: var(--accent); }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-group input {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            color: #fff;
            padding: 12px 16px;
            border-radius: 8px;
            font-family: var(--font-body);
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--accent);
        }

        button {
            width: 100%;
            background: rgba(0,255,136,0.1);
            color: var(--accent);
            border: 1px solid var(--accent);
            padding: 14px;
            border-radius: 8px;
            font-family: var(--font-head);
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }

        button:hover {
            background: var(--accent);
            color: var(--bg);
            box-shadow: 0 0 15px rgba(0,255,136,0.4);
        }

        .error-msg {
            color: var(--danger);
            font-size: 13px;
            margin-top: 16px;
            display: none;
            background: rgba(255,51,85,0.1);
            padding: 10px;
            border-radius: 6px;
            border: 1px solid rgba(255,51,85,0.3);
        }

        .demo-creds {
            margin-top: 30px;
            font-size: 12px;
            color: var(--muted);
            border-top: 1px solid var(--border);
            padding-top: 20px;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo">🍯 Honeypot<span>X</span></div>
        
        <form id="loginForm">
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="username" required autocomplete="off">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit">INIZIA SESSIONE</button>
        </form>

        <div id="errorMsg" class="error-msg">❌ Credenziali non valide!</div>

        <div class="demo-creds">
            <strong>Demo Scuola:</strong> admin_scuola / scuola123<br>
            <strong>Demo Azienda:</strong> admin_tech / techcorp123
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const errorBox = document.getElementById('errorMsg');

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username: u, password: p})
                });

                if(res.ok) {
                    // Login avvenuto con successo, andiamo alla dashboard!
                    window.location.href = '/dashboard';
                } else {
                    // Credenziali errate
                    errorBox.style.display = 'block';
                }
            } catch (err) {
                errorBox.textContent = "Errore di connessione al server.";
                errorBox.style.display = 'block';
            }
        });
    </script>
</body>
</html>
