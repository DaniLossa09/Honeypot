[honeypot]
hostname = server01
log_path = /cowrie/cowrie-git/var/log/cowrie
download_path = var/lib/cowrie/downloads
share_path = share/cowrie
auth_class = UserDB

[userdb]
userdb = etc/userdb.txt

[output_jsonlog]
enabled = true
logfile = /cowrie/cowrie-git/var/log/cowrie/cowrie.json

[ssh]
enabled = true
listen_port = 2222

[telnet]
enabled = true
listen_port = 2223

[output_textlog]
enabled = true 
logfile = ${honeypot:log_path}/cowrie.log

