{
    "device.node_id": "honeypot-01",

    "logging.file": "/var/log/opencanary/opencanary.log",

    "logger": {
        "class": "PyLogger",
        "kwargs": {
            "formatters": {
                "plain": {
                    "format": "%(message)s"
                }
            },
            "handlers": {
                "file": {
                    "class": "logging.FileHandler",
                    "filename": "/var/log/opencanary/opencanary.log",
                    "formatter": "plain"
                },
                "console": {
                    "class": "logging.StreamHandler",
                    "formatter": "plain"
                }
            }
        }
    },

    "http.enabled": true,
    "http.port": 80,
    "http.banner": "Apache/2.4.57 (Ubuntu)",

    "https.enabled": true,
    "https.port": 443,

    "portscan.enabled": true,

    "git.enabled": false,
    "ftp.enabled": false,
    "ssh.enabled": false
}